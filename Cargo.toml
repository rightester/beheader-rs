[package]
name = "beheader-rs"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "beheader"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
tempfile = "3"
anyhow = "1"
serde_json = "1"

[profile.release]
opt-level = "z"
strip = true
lto = true
codegen-units = 1
