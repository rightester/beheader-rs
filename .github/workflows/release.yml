name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. 0.3.2)'
        required: true
        type: string
      prerelease:
        description: 'Mark as pre-release'
        required: false
        default: false
        type: boolean

jobs:
  build-native:
    name: Build native (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
            artifact: beheader-windows-x86_64.exe
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            ext: .exe
            artifact: beheader-windows-aarch64.exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            artifact: beheader-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            ext: ""
            artifact: beheader-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
            artifact: beheader-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            artifact: beheader-macos-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
        run: cargo build --release --target ${{ matrix.target }}

      - name: Copy binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/beheader-bin${{ matrix.ext }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown,wasm32-wasip1

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: wasm-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build web wasm
        run: wasm-pack build --target web --release --out-dir pkg-web

      - name: Build bundler wasm
        run: wasm-pack build --target bundler --release --out-dir pkg-bundler

      - name: Build WASI
        run: cargo build --release --target wasm32-wasip1

      - name: Package web-web
        run: tar czf beheader-web-web.tar.gz -C pkg-web .

      - name: Package web-bundler
        run: tar czf beheader-web-bundler.tar.gz -C pkg-bundler .

      - name: Copy WASI
        run: cp target/wasm32-wasip1/release/beheader-bin.wasm beheader-wasi.wasm

      - name: Upload web-web artifact
        uses: actions/upload-artifact@v4
        with:
          name: beheader-web-web
          path: beheader-web-web.tar.gz
          retention-days: 1

      - name: Upload web-bundler artifact
        uses: actions/upload-artifact@v4
        with:
          name: beheader-web-bundler
          path: beheader-web-bundler.tar.gz
          retention-days: 1

      - name: Upload WASI artifact
        uses: actions/upload-artifact@v4
        with:
          name: beheader-wasi
          path: beheader-wasi.wasm
          retention-days: 1

  release:
    name: Create Release
    needs: [build-native, build-wasm]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: v${{ inputs.version }}
          prerelease: ${{ inputs.prerelease }}
          generate_release_notes: true
          files: artifacts/**/*
